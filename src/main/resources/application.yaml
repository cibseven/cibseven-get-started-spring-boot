camunda.bpm:
  admin-user:
    id: demo
    password: demo
    firstName: Demo
  filter:
    create: All tasks
  # https://docs.cibseven.org/manual/latest/reference/bpmn20/events/timer-events/
  cron:
    # By default, the engine uses QUARTZ 2.5.0 cron syntax for timer events.
    # Alternatively, SPRING53 cron syntax can also be used.
    type: QUARTZ
    # Provides compatibility with legacy Quartz 1.8.4 cron syntax used in CIB seven 2.0.x (and earlier)
    # and Camunda 7.23 (or earlier) for older process definitions.
    # This option applies only when using QUARTZ cron type.
    support-legacy-quartz-syntax: true

spring:
  config:
    import:
      - optional:classpath:cibseven-webclient.properties

cibseven:
  webclient:
    services:
      basePath: services/v1
    # Engine rest
    engineRest:
      url: http://localhost:8080
    # BPM provider for Enterprise Edition
    # bpm:
    #   provider: org.cibseven.webapp.providers.SevenProviderEE
