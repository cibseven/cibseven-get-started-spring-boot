camunda.bpm:
  admin-user:
    id: demo
    password: demo
    firstName: Demo
  filter:
    create: All tasks

spring:
  config:
    import:
      - optional:classpath:cibseven-webclient.properties

cibseven:
  webclient:
    services:
      basePath: services/v1
    # Engine rest - not needed when using Direct Provider
    # engineRest:
    #   url: http://localhost:8080
    # BPM provider for Enterprise Edition - Direct Provider (no REST, in-process)
    bpm:
      provider: org.cibseven.webapp.providers.SevenDirectProviderEE
