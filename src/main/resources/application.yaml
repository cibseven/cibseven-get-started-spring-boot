camunda.bpm:
#  admin-user:
#    id: demo
#    password: demo
#    firstName: Demo
  filter:
    create: All tasks
  oauth2:
    identity-provider:
      group-name-attribute: groups
  sso-logout:
    enabled: true
    postLogoutRedirectUri: http://localhost:8080/webapp/

spring:
  config:
    import:
      - optional:classpath:cibseven-webclient.properties

spring.security:
  oauth2:
    # spring security oauth2 client configuration for legacy Camunda webapp
    client:
      registration:
        keycloak:
          clientId: <clientId>
          clientSecret: <clientSecret>
          scope: openid,profile,email,offline_access,roles
          authorization-grant-type: authorization_code
          redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
      provider:
        keycloak:
          authorization-uri: <authUri>
          token-uri: <tokenUri>
          user-info-uri: <usersUri>
          jwk-set-uri: <certsUri>
          user-name-attribute: preferred_username
    # spring security oauth2 resource server configuration for engine REST
    resourceserver:
      jwt:
        principal-claim-name: preferred_username
        jwk-set-uri: https://sso-test.cib.de/realms/cib-seven/protocol/openid-connect/certs

cibseven:
  webclient:
    services:
      basePath: services/v1
    # Engine rest
    engineRest:
      url: http://localhost:8080
    authentication:
      tokenValidMinutes: 30
      tokenProlongMinutes: 10
    sso:
      active: true
      endpoints:
        authorization: <authUri>
        token: <tokenUri>
        jwks: <certsUri>
        user: <usersUri>
      clientId: <clientId>
      clientSecret: <clientSecret>
      scopes: openid email profile
      userIdProperty: preferred_username
      userNameProperty: name
      accessTokenToEngineRest: true
    bpm:
      provider: org.cibseven.webapp.providers.SevenProvider
    user:
      provider: org.cibseven.webapp.auth.KeycloakUserProvider

logging:
  level:
    root: INFO
#    org.cibseven.bpm.spring.boot.starter.security.oauth2: DEBUG
#    org.springframework.security.oauth2.server.resource.web.authentication.BearerTokenAuthenticationFilter: DEBUG
