camunda.bpm:
  admin-user:
    id: demo
    password: demo
    firstName: Demo
  filter:
    create: All tasks

spring:
  config:
    import:
      - optional:classpath:cibseven-webclient.properties

cibseven:
  webclient:
    services:
      basePath: services/v1
    # Engine rest
    engineRest:
      url: http://localhost:8080
    # BPM provider for Enterprise Edition
    # bpm:
    #   provider: org.cibseven.webapp.providers.SevenProviderEE

springdoc:
  api-docs:
    path: /webapp/v3/api-docs
  swagger-ui:
    path: /webapp/swagger-ui
    operationsSorter: alpha
    tagsSorter: alpha
    doc-expansion: none
