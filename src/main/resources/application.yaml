camunda.bpm:
  admin-user:
    id: demo
    password: demo
    firstName: Demo
  filter:
    create: All tasks
 
logging.level.org.cibseven.community.mcp: DEBUG
 
server.port: 8080
spring:
  config:
    import:
      - optional:classpath:cibseven-webclient.properties
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        name: mcp-server-spring
        version: 1.0.0
        type: SYNC
        instructions: "This stateless server is optimized for cloud deployments"
        streamable-http:
          mcp-endpoint: /mcp
        #sse-endpoint: /mcp
 
 
cibseven:
  mcp.processes-mcp: true
  webclient:
    services:
      basePath: services/v1
    # Engine rest
    engineRest:
      url: http://localhost:8080
    # BPM provider for Enterprise Edition
    # bpm:
    #   provider: org.cibseven.webapp.providers.SevenProviderEE
springdoc:
  api-docs:
    path: /webapp/v3/api-docs
  swagger-ui:
    path: /webapp/swagger-ui
    operationsSorter: alpha
    tagsSorter: alpha
    doc-expansion: none